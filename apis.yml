aid: cred
name: CRED
description: >-
  CRED is an Indian consumer fintech that started with premium credit-card
  bill payments and rewards and has expanded into peer-to-peer payments
  (Scan & Pay, Tap to Pay, RuPay credit card on UPI), short-term credit
  (CRED Cash, CRED Mint), wealth (CRED Money), e-commerce (CRED Store), and
  travel. CRED's surface area is overwhelmingly consumer-app and the
  company does not publish a public, self-service developer portal. Its
  engineering organisation contributes to the broader ecosystem via the
  engineering.cred.club tech blog and open-source repositories under the
  CRED-CLUB GitHub org. B2B integrations (merchant acceptance, issuer
  partnerships, etc.) are negotiated directly with the partnerships team.
